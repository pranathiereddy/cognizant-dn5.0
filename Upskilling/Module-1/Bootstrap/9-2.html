<!DOCTYPE html>
<html>
<head>
    <title>Bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">

    <h3>Button Group</h3>

    <div class="btn-group" role="group">
        <button type="button" class="btn btn-primary">Left</button>
        <button type="button" class="btn btn-primary">Middle</button>
        <button type="button" class="btn btn-primary">Right</button>
    </div>

    <br><br>

    <h3>Toggle Buttons with Checkboxes</h3>

    <div class="btn-group" role="group">
        <input type="checkbox" class="btn-check" id="check1" autocomplete="off">
        <label class="btn btn-outline-success" for="check1">Option 1</label>

        <input type="checkbox" class="btn-check" id="check2" autocomplete="off">
        <label class="btn btn-outline-success" for="check2">Option 2</label>

        <input type="checkbox" class="btn-check" id="check3" autocomplete="off">
        <label class="btn btn-outline-success" for="check3">Option 3</label>
    </div>

</body>
</html>
